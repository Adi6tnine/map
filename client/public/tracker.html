<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Live Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --blue:#2563EB;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
      --bg:#0f172a;--surface:#1e293b;--border:#334155;
      --text:#f1f5f9;--muted:#64748b;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100dvh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:20px;gap:16px;
    }

    /* Header */
    .header{text-align:center}
    .header .icon{font-size:40px;margin-bottom:8px}
    .header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
    .header p{font-size:13px;color:var(--muted);margin-top:4px}

    /* Card */
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:20px;width:100%;max-width:380px;
    }
    .card-label{
      font-size:10px;font-weight:600;color:var(--muted);
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;
    }

    /* Input */
    .field{margin-bottom:14px}
    .field label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
    .field input{
      width:100%;background:#0f172a;border:1.5px solid var(--border);
      border-radius:10px;padding:11px 14px;color:var(--text);
      font-size:15px;outline:none;transition:border-color .15s;
    }
    .field input:focus{border-color:var(--blue)}

    /* Big action button */
    .btn{
      width:100%;padding:16px;border-radius:14px;border:none;
      font-size:16px;font-weight:700;cursor:pointer;
      transition:transform .1s,opacity .15s;letter-spacing:.2px;
    }
    .btn:active{transform:scale(0.97)}
    .btn-start{background:var(--green);color:#fff}
    .btn-stop {background:var(--red);color:#fff;display:none}

    /* Status */
    .status-card{
      background:#0f172a;border-radius:14px;padding:16px;
      margin-top:14px;display:flex;flex-direction:column;gap:12px;
    }
    .status-row{display:flex;align-items:center;gap:10px;font-size:14px}
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--muted);flex-shrink:0;transition:background .3s;
    }
    .dot.live{background:var(--green);animation:blink 1.4s infinite}
    .dot.error{background:var(--red)}
    .dot.waiting{background:var(--amber)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* Stats grid */
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
    .stat{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;padding:10px 8px;text-align:center;
    }
    .stat-val{font-size:18px;font-weight:700;color:var(--text)}
    .stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

    /* Coords */
    .coords{
      font-family:monospace;font-size:12px;color:var(--muted);
      text-align:center;padding:8px;background:var(--surface);
      border-radius:8px;word-break:break-all;
    }

    /* Flow bar */
    .flow{
      display:flex;align-items:center;justify-content:center;
      gap:4px;flex-wrap:wrap;
    }
    .flow-step{
      font-size:11px;padding:4px 10px;border-radius:20px;
      border:1px solid var(--border);color:var(--muted);
      transition:all .3s;
    }
    .flow-step.lit{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}
    .flow-arrow{color:var(--border);font-size:12px}

    /* Add to home screen hint */
    .hint{
      font-size:11px;color:var(--muted);text-align:center;
      max-width:300px;line-height:1.5;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="icon">📡</div>
  <h1>Live GPS Tracker</h1>
  <p>Sends your real location to the dashboard</p>
</div>

<!-- Flow indicator -->
<div class="flow">
  <div class="flow-step" id="s-gps">📱 GPS</div>
  <div class="flow-arrow">→</div>
  <div class="flow-step" id="s-srv">🖥️ Server</div>
  <div class="flow-arrow">→</div>
  <div class="flow-step" id="s-map">🗺️ Map</div>
</div>

<div class="card">
  <div class="card-label">Configuration</div>

  <div class="field">
    <label>Device ID</label>
    <input id="deviceId" type="text" value="TRANSPORT-001" autocomplete="off" spellcheck="false"/>
  </div>

  <div class="field">
    <label>Server URL</label>
    <input id="serverUrl" type="url" placeholder="https://your-backend.railway.app" autocomplete="off" spellcheck="false"/>
  </div>

  <button class="btn btn-start" id="startBtn" onclick="startTracking()">▶ Start Tracking</button>
  <button class="btn btn-stop"  id="stopBtn"  onclick="stopTracking()">■ Stop Tracking</button>

  <div class="status-card">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="statusText">Tap Start to begin</span>
    </div>
    <div class="coords" id="coords">Waiting for GPS…</div>
  </div>
</div>

<!-- Stats -->
<div class="stats" style="width:100%;max-width:380px;">
  <div class="stat"><div class="stat-val" id="statPings">0</div><div class="stat-lbl">Pings</div></div>
  <div class="stat"><div class="stat-val" id="statAcc">—</div><div class="stat-lbl">Accuracy m</div></div>
  <div class="stat"><div class="stat-val" id="statSpeed">—</div><div class="stat-lbl">km/h</div></div>
</div>

<p class="hint">
  💡 On iPhone: tap Share → "Add to Home Screen" for a native-like experience
</p>

<script>
  let watchId   = null;
  let pingCount = 0;
  let lastPingOk = false;

  // Auto-fill server URL from env injected at build, or from current host
  const defaultServer = window.__SERVER_URL__ || '';
  const serverInput   = document.getElementById('serverUrl');
  if (defaultServer) {
    serverInput.value = defaultServer;
  } else if (location.hostname !== 'localhost') {
    // If served from same host as frontend, guess backend port
    serverInput.value = `https://${location.hostname.replace('5173','4000')}`;
  }

  function setState(msg, dotClass) {
    document.getElementById('statusText').textContent = msg;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (dotClass ? ' ' + dotClass : '');
  }

  function litFlow(...ids) {
    ['s-gps','s-srv','s-map'].forEach(id => {
      document.getElementById(id).classList.toggle('lit', ids.includes(id));
    });
  }

  async function sendLocation(lat, lng, accuracy, speed) {
    const id  = document.getElementById('deviceId').value.trim() || 'TRANSPORT-001';
    const url = document.getElementById('serverUrl').value.trim().replace(/\/+$/, '');
    if (!url) { setState('Enter server URL', 'error'); return; }

    litFlow('s-gps');

    try {
      const res = await fetch(`${url}/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id,
          lat,
          lng,
          accuracy,
          speed: speed ? (speed * 3.6).toFixed(1) : null, // m/s → km/h
          source: 'mobile',
          type: 'Transport',
        }),
      });

      if (res.ok) {
        pingCount++;
        document.getElementById('statPings').textContent = pingCount;
        document.getElementById('statAcc').textContent   = accuracy ? Math.round(accuracy) : '—';
        document.getElementById('statSpeed').textContent = speed ? (speed * 3.6).toFixed(0) : '0';
        setState('Live — sending GPS', 'live');
        litFlow('s-gps', 's-srv', 's-map');
        lastPingOk = true;
      } else {
        setState(`Server error ${res.status}`, 'error');
        litFlow();
      }
    } catch (e) {
      setState('Cannot reach server', 'error');
      litFlow('s-gps');
      lastPingOk = false;
    }
  }

  function startTracking() {
    if (!navigator.geolocation) {
      setState('Geolocation not supported', 'error'); return;
    }

    setState('Getting GPS fix…', 'waiting');
    pingCount = 0;
    document.getElementById('statPings').textContent = '0';

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude: lat, longitude: lng, accuracy, speed } = pos.coords;
        document.getElementById('coords').textContent =
          `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        sendLocation(lat, lng, accuracy, speed);
      },
      (err) => {
        const msg = {
          1: 'Location permission denied — check browser settings',
          2: 'GPS unavailable — try going outside',
          3: 'GPS timeout — move to open area',
        }[err.code] || err.message;
        setState(msg, 'error');
        litFlow();
      },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
    );

    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display  = 'block';
  }

  function stopTracking() {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    setState('Stopped', '');
    litFlow();
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display  = 'none';
  }

  // Keep screen awake using Wake Lock API (supported on Android Chrome)
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        await navigator.wakeLock.request('screen');
      }
    } catch (_) {}
  }
  requestWakeLock();
</script>
</body>
</html>
